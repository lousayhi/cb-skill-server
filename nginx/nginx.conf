user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;

    upstream skills_backend {
        server skills-server:8000;
    }

    # Internal auth subrequest: delegates validation to the FastAPI middleware.
    # The API key (Authorization / X-API-Key) is forwarded; FastAPI returns 401
    # for invalid keys, which nginx maps to denying the request.
    server {
        listen 80;
        server_name _;
        # redirect all HTTP to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        client_max_body_size 10m;

        location / {
            proxy_pass http://skills_backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # stream request body (needed for MCP / invoke)
            proxy_request_buffering off;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # health check bypasses auth (FastAPI /healthz is public anyway)
        location = /healthz {
            proxy_pass http://skills_backend;
        }
    }
}
